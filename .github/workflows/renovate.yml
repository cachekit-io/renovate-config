name: Renovate

# Self-hosted Renovate cron for the cachekit-io org.
#
# We run Renovate ourselves (rather than via Mend hosted) because Mend's free
# tier imposes mode=silent on every run, which gates PRs behind manual checkbox
# ticking. Self-hosting gives us the standard policy-driven flow: grouped PRs,
# automerge for safe categories, dashboard issue for everything else.
#
# Auth: dedicated `cachekit-renovate-bot` GitHub App, installed org-wide. App
# credentials live in this repo's secrets. The token minted here covers every
# repo the App is installed on (autodiscover finds them).
#
# Schedule: hourly so security alerts (which bypass the policy schedule) get
# acted on promptly. Non-security PRs still only fire inside the preset's
# "before 6am Monday" window.

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
    inputs:
      log-level:
        description: 'Renovate log level'
        type: choice
        default: info
        options: [debug, info, warn, error]
      dry-run:
        description: 'Dry run mode (no PRs opened)'
        type: choice
        default: 'disabled'
        options: ['disabled', 'extract', 'lookup', 'full']

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Mint cachekit-renovate-bot installation token (org-wide)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # owner without repositories: mints a token covering every repo the
          # App is installed on, which is what autodiscover needs.
          owner: ${{ github.repository_owner }}

      - name: Checkout config
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Conditionally set RENOVATE_DRY_RUN. Setting it inline via `env:` doesn't
      # work because GHA expression `(x == 'disabled' && '' || x)` resolves to
      # the falsy-fallback 'disabled', and Renovate treats any non-null value
      # as dry-run enabled. Writing to $GITHUB_ENV only when we actually want
      # dry-run avoids the trap entirely.
      - name: Enable dry-run (if requested)
        if: inputs.dry-run != '' && inputs.dry-run != 'disabled'
        run: echo "RENOVATE_DRY_RUN=${{ inputs.dry-run }}" >> "$GITHUB_ENV"

      - name: Run Renovate
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          configurationFile: config.js
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: ${{ inputs.log-level || 'info' }}
